{% extends "base_auth.html" %}
{% load static %}

{% block title %}
Геккон - вход
{% endblock %}

{% block content %}

<div class="auth-page">

    <div class="login-card">

        <h1 class="login-title">
            Геккон
        </h1>
            {% if form.errors %}
                <div class="error-message">
                    Неверный логин или пароль
                </div>
            
            
            {% endif %}

        <form method="post">

            {% csrf_token %}

            <div class="form-group">

                <label for="username">
                    Логин
                </label>

                <input
                    id="username"
                    type="text"
                    name="username"
                    placeholder="Введите логин"
                    autofocus
                    required
                >

            </div>

            <div class="form-group">

                <label for="password">
                    Пароль
                </label>

                <input
                    id="password"
                    type="password"
                    name="password"
                    placeholder="Введите пароль"
                    required
                >

            </div>

            <button
                type="submit"
                class="login-btn"
            >
                Войти
            </button>

        </form>

    </div>

</div>

{% endblock %}
